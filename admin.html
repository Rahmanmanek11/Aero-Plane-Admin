<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Aero Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        utama: '#0F4C81',
                        gelap: '#0B2447',
                        sukses: '#10B981',
                        gagal: '#EF4444'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-inter">
    <div id="loginAdmin" class="fixed inset-0 bg-gray-900/90 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-sm mx-4 shadow-xl">
            <h3 class="text-xl font-bold text-center mb-4">🔐 Masuk Panel Admin</h3>
            <div class="mb-4">
                <label class="block text-gray-700 mb-1">Kata Sandi</label>
                <input type="password" id="passAdmin" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-utama" placeholder="Masukkan sandi">
            </div>
            <button onclick="cekSandi()" class="w-full bg-utama hover:bg-gelap text-white py-2.5 rounded font-medium transition">Masuk</button>
        </div>
    </div>

    <div id="kontenAdmin" class="hidden">
        <header class="bg-gray-900 text-white py-4 shadow-lg">
            <div class="container mx-auto px-4 flex justify-between items-center">
                <h1 class="text-xl md:text-2xl font-bold"><i class="fa-solid fa-user-shield mr-2"></i> PANEL ADMIN AERO PLANE</h1>
                <button onclick="keluarAdmin()" class="bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded text-sm transition">Keluar</button>
            </div>
        </header>

        <div class="container mx-auto px-4 py-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div class="bg-white p-5 rounded-xl shadow">
                    <h3 class="text-lg font-semibold mb-3">👤 Daftar Pengguna</h3>
                    <div id="daftarPengguna" class="space-y-3"></div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow">
                    <h3 class="text-lg font-semibold mb-3">⏳ Transaksi Menunggu</h3>
                    <div id="daftarTransaksi" class="space-y-3"></div>
                </div>
            </div>
            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-white p-5 rounded-xl shadow">
                    <h3 class="text-lg font-semibold mb-3">💸 Permintaan Penarikan</h3>
                    <div id="daftarPenarikan" class="space-y-3"></div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow">
                    <h3 class="text-lg font-semibold mb-3">💬 Pesan Masuk</h3>
                    <div id="kotakPesanAdmin" class="h-56 overflow-y-auto border rounded p-3 bg-gray-50 mb-3"></div>
                    <div class="flex gap-2">
                        <input type="text" id="balasPesan" placeholder="Ketik balasan..." class="flex-1 border rounded px-3 py-2">
                        <button onclick="kirimBalasan()" class="bg-utama hover:bg-gelap text-white px-3 rounded">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script-admin.js"></script>
</body>
</html>
